name: Vagrant

on:
  push:
    branches:
    - master
    - dev
    - 'dev/**'
    paths:
    - 'scripts/Vagrantfile'
  pull_request:
    paths:
    - 'scripts/Vagrantfile'

permissions: {} # none

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v4
    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
    - name: Set up Vagrant repo
      run: |
        # https://developer.hashicorp.com/vagrant/downloads#linux
        wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
    - name: Install packages
      run: sudo apt update && sudo apt install -y vagrant virtualbox
    - name: Configure vagrant
      run: vagrant plugin install vagrant-disksize
    - name: Set config.disksize.size under CI limit
      run: sed "/config.disksize.size = .*/d" -i scripts/Vagrantfile
    - name: Run "vagrant up" in scripts directory
      run: pushd scripts && vagrant up && popd
    - name: git status && git diff
      run: git status && git diff
